<!--======================================== // Hidden Canvas — drawing logic // ===============--> 
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<!--baise-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hidden Canvas </title>
    <link rel="icon" href="log11.png" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style1.css">
</head>
<body></body>
<div class="container"></div>
<div class="app-wrapper">
    <h1><b><i>Hidden Canvas</i></b></h1>
<!--toolbars-->
    <div id="toolbar">
        <button id="themeToggle" class="tool-btn" title="Toggle Theme"></button>
        <!--toolbar-divider -->
        <div class="toolbar-divider"></div>

        <button id="pencil" class="tool-btn active" title="Pencil Tool">
            <svg viewBox="0 0 24 24"><path d="M16.5 3.5 L20.5 7.5 L8 20 L4 20 L4 16 Z"/><line x1="14" y1="6" x2="18" y2="10"/></svg>
        </button>
        <button id="rect" class="tool-btn" title="Rectangle Tool">
            <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        </button>
        <button id="Triangle" class="tool-btn" title="Triangle Tool">
            <svg viewBox="0 0 24 24"><path d="M12 4 L21 20 L3 20 Z" stroke-linejoin="round"/></svg>
        </button>
        <button id="circle" class="tool-btn" title="Circle Tool">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/></svg>
        </button>
        <button id="eraser" class="tool-btn" title="Eraser">
            <svg viewBox="0 0 24 24"><path d="M18 13 L11 20 L4 13 L13 4 L20 11 Z"/><line x1="8" y1="20" x2="20" y2="20"/></svg>
        </button>
        <button id="fillToggle" class="tool-btn" title="Toggle Fill Style">
            <svg viewBox="0 0 24 24"><path d="M3 12 L11 4 L20 13 L12 21 Z"/><line x1="7" y1="8" x2="16" y2="17"/><path d="M17 15 C17 15 20 17.5 20 19.5 C20 21 18.7 22 17 22 C15.3 22 14 21 14 19.5 C14 17.5 17 15 17 15 Z"/></svg>
        </button>

        <div class="toolbar-divider"></div>
        <!--Size of Brush -->
        <div class="size-slider-wrapper" title="Brush Size">
        <input type="range" id="brushSize" min="1" max="50" value="4">
            <span id="sizeValue">4px</span>
        </div>
        <div class="toolbar-divider"></div>
        <div class="color-wrapper">
        <input type="color" id="colorPicker" value="#000000" title="Pick a Color">
            <div class="color-format-toggle">
                <button type="button" id="formatHex" class="format-btn active" data-format="hex">HEX</button>
                <button type="button" id="formatRgb" class="format-btn" data-format="rgb">RGB</button>
                <button type="button" id="formatHsl" class="format-btn" data-format="hsl">HSL</button>
            </div>
            <div id="colorInputs" class="color-inputs">
            <input type="text" id="hexInput" class="color-text-input" maxlength="7" value="#000000">
            </div>
        </div>
        <div class="toolbar-divider"></div>

        <button id="undo" class="tool-btn" title="Undo Last Action">
            <svg viewBox="0 0 24 24"><path d="M9 8 L4 12 L9 16"/><path d="M4 12 H14 A6 6 0 0 1 14 24 H12"/></svg>
        </button>
        <button id="redo" class="tool-btn" title="Redo Last Action">
        <svg viewBox="0 0 24 24"><path d="M15 8 L20 12 L15 16"/>
            <path d="M20 12 H10 A6 6 0 0 0 10 24 H12"/></svg>
        </button>
        <button id="clear" class="tool-btn danger-btn" title="Clear Canvas">
            <svg viewBox="0 0 24 24"><path d="M5 7 H19 M9 7 V4 H15 V7 M7 7 L8 21 H16 L17 7"/></svg>
        </button>
        <div class="toolbar-divider"></div>
        <button id="saveImage" class="tool-btn" title="Save as PNG">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M4 18 L9 13 L13 17 L16 14 L20 18"/></svg>
            <span class="btn-label">Image</span>
        </button>
        <button id="savePDF" class="tool-btn" title="Save as PDF">
            <svg viewBox="0 0 24 24"><path d="M6 2 H14 L19 7 V22 H6 Z"/><path d="M14 2 V7 H19"/></svg>
            <span class="btn-label">PDF</span>
        </button>
    </div>
    <!--Canvas-->
    <canvas id="canvas"></canvas>
</div>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
